name: compile-sketch

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    # Build both XIAO nRF52840 variants. The Sense board has the onboard
    # LSM6DS3 IMU; the plain board does not (accelerometer logging degrades
    # gracefully). Same MCU/BLE/bootloader otherwise.
    strategy:
      fail-fast: false
      matrix:
        board:
          - name: xiao-nrf52840-sense
            fqbn: Seeeduino:nrf52:xiaonRF52840Sense
            define: BIRDSEYE_BOARD_SENSE
          - name: xiao-nrf52840
            fqbn: Seeeduino:nrf52:xiaonRF52840
            define: BIRDSEYE_BOARD_NONSENSE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Seeed nRF52 BSP shells out to adafruit-nrfutil during link to
      # package the .hex into a .zip, even when only compiling — install
      # it before the compile step.
      - name: Install adafruit-nrfutil
        run: pip install --user adafruit-nrfutil

      - name: Compile sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.board.fqbn }}
          platforms: |
            - name: Seeeduino:nrf52
              source-url: https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
          libraries: |
            - name: ArduinoJson
            - name: SdFat - Adafruit Fork
            - name: Adafruit GFX Library
            - name: Adafruit SH110X
            - name: Adafruit SSD1306
            - name: SparkFun u-blox GNSS v3
            - name: Seeed Arduino LSM6DS3
            - name: ArxTypeTraits
            - source-url: https://github.com/TheAngryRaven/DovesLapTimer.git
          sketch-paths: |
            - BirdsEye
          cli-compile-flags: |
            - --build-property
            - compiler.cpp.extra_flags=-D${{ matrix.board.define }}
          enable-deltas-report: true

      # Hard flash-size gate. The XIAO nRF52840's app flash is shared
      # with the SoftDevice + bootloader; running it dry bricks OTA and
      # leaves no room to grow. Fail the build if the sketch uses more
      # than FLASH_BUDGET_PERCENT of the BSP-reported maximum. Uses the
      # absolute usage from the compile report (no base-branch compare
      # needed) and degrades to a warning if the report can't be parsed.
      - name: Flash size budget gate
        env:
          FLASH_BUDGET_PERCENT: 90
        run: |
          report="$(find sketches-reports -name '*.json' | head -1)"
          if [ -z "$report" ]; then
            echo "::warning::No compile report found — skipping size gate"
            exit 0
          fi
          echo "Reading $report"
          echo "Flash size entry:"
          jq -c '[.boards[].sketches[].sizes[] | select(.name=="flash")][0]' "$report" || true
          # The arduino/compile-sketches report nests usage under
          # .current.absolute (current schema). Fall back to older shapes
          # (.absolute.current, flat .absolute) and keep only a number, so a
          # schema change degrades visibly rather than silently passing.
          flash_abs="$(jq -r '
            [.boards[].sketches[].sizes[]
             | select(.name=="flash")
             | (.current.absolute? // .absolute.current? // .absolute?)]
            | map(select(type=="number")) | first // empty' "$report")"
          flash_max="$(jq -r '
            [.boards[].sketches[].sizes[]
             | select(.name=="flash") | .maximum]
            | map(select(type=="number")) | first // empty' "$report")"
          if [ -z "$flash_abs" ] || [ -z "$flash_max" ] || [ "$flash_max" = "0" ]; then
            echo "::warning::Could not read flash usage from report — skipping size gate"
            exit 0
          fi
          pct="$(awk "BEGIN { printf \"%.1f\", ($flash_abs / $flash_max) * 100 }")"
          echo "Flash: ${flash_abs} / ${flash_max} bytes (${pct}%), budget ${FLASH_BUDGET_PERCENT}%"
          over="$(awk "BEGIN { print (($flash_abs / $flash_max) * 100 > ${FLASH_BUDGET_PERCENT}) ? 1 : 0 }")"
          if [ "$over" = "1" ]; then
            echo "::error::Flash usage ${pct}% exceeds budget ${FLASH_BUDGET_PERCENT}% — reduce footprint or raise the budget deliberately"
            exit 1
          fi

      # OTA image-size gate. The SD-staged OTA path can only deliver an image
      # up to FW_MAX_IMAGE_SIZE (firmware_ota.ino) — FWBEGIN rejects anything
      # larger with FWERR:SIZE, and the staging region carved out below the
      # bootloader is exactly that size. The program's flash usage equals the
      # app .bin that gets streamed/flashed, so gate it against that cap: warn
      # as it approaches, fail if it crosses (the image would be un-OTA-able).
      - name: OTA image size gate
        env:
          # Keep in sync with FW_MAX_IMAGE_SIZE in BirdsEye/firmware_ota.ino.
          OTA_IMAGE_MAX_BYTES: 327680   # 320 KiB
          OTA_WARN_PERCENT: 90
        run: |
          report="$(find sketches-reports -name '*.json' | head -1)"
          if [ -z "$report" ]; then
            echo "::warning::No compile report found — skipping OTA image gate"
            exit 0
          fi
          flash_abs="$(jq -r '
            [.boards[].sketches[].sizes[]
             | select(.name=="flash")
             | (.current.absolute? // .absolute.current? // .absolute?)]
            | map(select(type=="number")) | first // empty' "$report")"
          if [ -z "$flash_abs" ]; then
            echo "::warning::Could not read flash usage from report — skipping OTA image gate"
            exit 0
          fi
          pct="$(awk "BEGIN { printf \"%.1f\", ($flash_abs / $OTA_IMAGE_MAX_BYTES) * 100 }")"
          echo "OTA image: ${flash_abs} / ${OTA_IMAGE_MAX_BYTES} bytes (${pct}% of the OTA cap)"
          if [ "$flash_abs" -gt "$OTA_IMAGE_MAX_BYTES" ]; then
            echo "::error::Image ${flash_abs} B exceeds the OTA cap ${OTA_IMAGE_MAX_BYTES} B — FWBEGIN would reject it (FWERR:SIZE). Shrink the image or raise FW_MAX_IMAGE_SIZE (which moves the staging base down, costing app space)."
            exit 1
          fi
          warn="$(awk "BEGIN { print (($flash_abs / $OTA_IMAGE_MAX_BYTES) * 100 >= ${OTA_WARN_PERCENT}) ? 1 : 0 }")"
          if [ "$warn" = "1" ]; then
            echo "::warning::OTA image at ${pct}% of the ${OTA_IMAGE_MAX_BYTES} B cap (>= ${OTA_WARN_PERCENT}%) — getting close to un-OTA-able; plan to shrink or raise the cap."
          fi

      - name: Upload size deltas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: size-deltas-${{ matrix.board.name }}
          path: sketches-reports
          if-no-files-found: ignore
