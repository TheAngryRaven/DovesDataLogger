name: release

# Build distributable firmware for the Seeed XIAO nRF52840 Sense and,
# when triggered by a version tag, publish a GitHub Release with the
# .hex (IDE/CLI flashing) and .uf2 (drag-and-drop to the bootloader
# drive) attached.
#
#   - push a tag like v1.1.0     -> builds + creates the release
#   - run manually (workflow_dispatch) -> builds + uploads artifacts only
#                                          (handy for testing the build)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the release on tag builds

env:
  FQBN: Seeeduino:nrf52:xiaonRF52840Sense
  SEEED_URL: https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
  # nRF52840 UF2 family id (Adafruit bootloader). uf2conv tags blocks
  # with this so the bootloader accepts the image.
  UF2_FAMILY: '0xADA52840'

jobs:
  build:
    name: build firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install BSP, libraries and tools
        run: |
          arduino-cli config init --additional-urls "$SEEED_URL"
          arduino-cli core update-index
          arduino-cli core install Seeeduino:nrf52
          # DovesLapTimer ships from git, so allow git-url installs.
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install \
            "ArduinoJson" \
            "SdFat - Adafruit Fork" \
            "Adafruit GFX Library" \
            "Adafruit SH110X" \
            "Adafruit SSD1306" \
            "SparkFun u-blox GNSS v3" \
            "Seeed Arduino LSM6DS3" \
            "ArxTypeTraits"
          arduino-cli lib install --git-url https://github.com/TheAngryRaven/DovesLapTimer.git
          pip install --user adafruit-nrfutil

      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --output-dir dist \
            --warnings none \
            BirdsEye
          echo "----- build output -----"
          ls -la dist

      - name: Ensure a .uf2 exists
        run: |
          if ls dist/*.uf2 >/dev/null 2>&1; then
            echo "BSP already produced a .uf2"
          else
            echo "No .uf2 from the BSP — converting the .hex with uf2conv"
            hex="$(ls dist/*.hex | head -1)"
            if [ -z "$hex" ]; then
              echo "::error::No .hex produced — cannot build a .uf2"
              exit 1
            fi
            curl -fsSL -o uf2conv.py \
              https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py
            curl -fsSL -o uf2families.json \
              https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json
            python3 uf2conv.py "$hex" --convert --family "$UF2_FAMILY" \
              --output dist/BirdsEye.uf2
          fi
          ls -la dist

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          # Copy the flashable artifacts under stable names.
          cp dist/*.hex release-assets/ 2>/dev/null || true
          cp dist/*.uf2 release-assets/ 2>/dev/null || true
          cp dist/*.zip release-assets/ 2>/dev/null || true
          echo "----- release assets -----"
          ls -la release-assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: birdseye-firmware
          path: release-assets/*
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            Firmware build for the **Seeed XIAO nRF52840 Sense**.

            ### Flashing
            - **Easiest (.uf2):** double-tap the reset button to mount the
              `XIAO-SENSE` (bootloader) drive, then drag `BirdsEye.uf2` onto
              it. The board reboots into the new firmware automatically.
            - **Arduino IDE / CLI (.hex):** flash `BirdsEye.ino.hex` the same
              way you'd upload a sketch.

            See [CHANGELOG.md](https://github.com/TheAngryRaven/DovesDataLogger/blob/master/CHANGELOG.md)
            for what changed.
